name: Automated Trading System (Day + Momentum)

on:
  # Schedule: 9:00 AM IST = 3:30 AM UTC (Mon-Fri)
  schedule:
    - cron: '30 3 * * 1-5'
  
  # Manual trigger
  workflow_dispatch:

jobs:
  trading:
    runs-on: ubuntu-latest
    timeout-minutes: 240  # 4 hours max
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create storage directories
        run: |
          mkdir -p storage/state
          mkdir -p storage/logs
      
      # ============================================================
      # 9:00 AM IST - Train Day Trade Model
      # ============================================================
      - name: 🤖 Train Day Trade Model (9:00 AM IST)
        id: train
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "🤖 Training XGBoost model..."
          python engine/train_daytrade_model.py || echo "::warning::Model training failed"
        continue-on-error: true
      
      # ============================================================
      # 9:20 AM IST - Momentum Morning + Rebalance Check
      # ============================================================
      - name: Wait 20 minutes (9:00 → 9:20 AM)
        if: steps.train.outcome == 'success'
        run: |
          echo "⏰ Waiting 20 minutes..."
          sleep 1200
      
      - name: 📊 Momentum Rebalance (if due)
        id: momentum_rebalance
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "📊 Checking momentum rebalance..."
          python engine/momentum_rebalance.py || echo "::warning::Momentum rebalance failed"
        continue-on-error: true
      
      - name: 🔍 Momentum Morning Check
        id: momentum_morning
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "🔍 Checking momentum stops/targets..."
          python engine/momentum_morning.py || echo "::warning::Momentum morning check failed"
        continue-on-error: true
      
      # ============================================================
      # 9:29 AM IST - Generate Day Trade Signals
      # ============================================================
      - name: Wait 9 minutes (9:20 → 9:29 AM)
        if: steps.train.outcome == 'success'
        run: |
          echo "⏰ Waiting 9 minutes..."
          sleep 540
      
      - name: 📈 Generate Day Trade Signals
        id: signals
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "📈 Generating day trade signals..."
          python engine/generate_daytrade_signals.py || echo "::warning::Signal generation failed"
        continue-on-error: true
      
      # ============================================================
      # 9:30 AM IST - Execute Day Trades
      # ============================================================
      - name: Wait 1 minute (9:29 → 9:30 AM)
        if: steps.signals.outcome == 'success'
        run: sleep 60
      
      - name: 💰 Execute Day Trades
        id: execute
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "💰 Executing day trades..."
          python engine/execute_daytrade.py || echo "::warning::Trade execution failed"
        continue-on-error: true
      
      # ============================================================
      # 11:15 AM IST - Close Day Trade Positions
      # ============================================================
      - name: Wait 1h 45m (9:30 → 11:15 AM)
        if: steps.execute.outcome == 'success'
        run: |
          echo "⏰ Holding day trade positions..."
          sleep 6300
      
      - name: 🏁 Close Day Trade Positions
        id: close_day
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "🏁 Closing day trade positions..."
          python engine/close_daytrade.py || echo "::warning::Position close failed"
        continue-on-error: true
      
      # ============================================================
      # 3:20 PM IST - Momentum EOD Update
      # ============================================================
      - name: Wait until 3:20 PM (11:15 AM → 3:20 PM)
        run: |
          echo "⏰ Waiting until 3:20 PM IST for momentum EOD..."
          sleep 14700  # 4h 5m
      
      - name: 📉 Momentum EOD Update (3:20 PM IST)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "📉 Updating momentum trailing stops..."
          python engine/momentum_eod.py || echo "::warning::Momentum EOD failed"
        continue-on-error: true
      
      # ============================================================
      # Save Results
      # ============================================================
      - name: 💾 Save Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-results-${{ github.run_number }}
          path: |
            storage/state/
            storage/logs/
          retention-days: 30
      
      - name: 📊 Workflow Summary
        if: always()
        run: |
          echo "================================"
          echo "WORKFLOW COMPLETED"
          echo "================================"
          echo "Date: $(date)"
          echo ""
          echo "Day Trading:"
          echo "  Train Model: ${{ steps.train.outcome }}"
          echo "  Generate Signals: ${{ steps.signals.outcome }}"
          echo "  Execute Trades: ${{ steps.execute.outcome }}"
          echo "  Close Positions: ${{ steps.close_day.outcome }}"
          echo ""
          echo "Momentum Trading:"
          echo "  Rebalance: ${{ steps.momentum_rebalance.outcome }}"
          echo "  Morning Check: ${{ steps.momentum_morning.outcome }}"
          echo "================================"
