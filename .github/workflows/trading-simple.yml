name: Automated Trading System

on:
  # Schedule: 9:00 AM IST = 3:30 AM UTC (Mon-Fri)
  schedule:
    - cron: '30 3 * * 1-5'
  
  # Manual trigger
  workflow_dispatch:

jobs:
  trading:
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3 hours max
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create storage directories
        run: |
          mkdir -p storage/state
          mkdir -p storage/logs
      
      - name: Train Model
        id: train
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "🤖 Training model..."
          python engine/train_daytrade_model.py || echo "::warning::Model training failed"
        continue-on-error: true
      
      - name: Wait for market (29 minutes)
        if: steps.train.outcome == 'success'
        run: |
          echo "⏰ Waiting 29 minutes for market stabilization..."
          sleep 1740
      
      - name: Generate Signals
        id: signals
        if: steps.train.outcome == 'success'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "📈 Generating signals..."
          python engine/generate_daytrade_signals.py || echo "::warning::Signal generation failed"
        continue-on-error: true
      
      - name: Wait 1 minute
        if: steps.signals.outcome == 'success'
        run: sleep 60
      
      - name: Execute Trades
        id: execute
        if: steps.signals.outcome == 'success'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "💰 Executing trades..."
          python engine/execute_daytrade.py || echo "::warning::Trade execution failed"
        continue-on-error: true
      
      - name: Wait 1h 45m
        if: steps.execute.outcome == 'success'
        run: |
          echo "⏰ Holding positions..."
          sleep 6300
      
      - name: Close Positions
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "🏁 Closing positions..."
          python engine/close_daytrade.py || echo "::warning::Position close failed"
        continue-on-error: true
      
      - name: Save Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-results-${{ github.run_number }}
          path: |
            storage/state/
            storage/logs/
          retention-days: 30
      
      - name: Summary
        if: always()
        run: |
          echo "📊 Workflow completed at $(date)"
          echo "Train: ${{ steps.train.outcome }}"
          echo "Signals: ${{ steps.signals.outcome }}"
          echo "Execute: ${{ steps.execute.outcome }}"
